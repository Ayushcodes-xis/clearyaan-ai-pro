<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#09090b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Clearyaan AI - Premium</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark-dimmed.min.css" id="hljs-theme">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Clearyaan%20AI%22%2C%22short_name%22%3A%22Clearyaan%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%2309090b%22%2C%22theme_color%22%3A%22%238b5cf6%22%7D">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  /* PREMIUM FUTURISTIC VARIABLES */
  :root[data-theme="dark"] {
    --bg-base: #050505;
    --bg-mesh-1: rgba(139, 92, 246, 0.15);
    --bg-mesh-2: rgba(14, 165, 233, 0.15);
    --glass-panel: rgba(20, 20, 25, 0.65);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-hover: rgba(255, 255, 255, 0.12);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --accent: #8b5cf6;
    --accent-glow: rgba(139, 92, 246, 0.5);
    --accent-sec: #0ea5e9;
    --msg-user: rgba(139, 92, 246, 0.15);
    --msg-bot: rgba(255, 255, 255, 0.03);
    --danger: #ef4444;
    --success: #10b981;
  }
  
  :root[data-theme="light"] {
    --bg-base: #f1f5f9;
    --bg-mesh-1: rgba(139, 92, 246, 0.2);
    --bg-mesh-2: rgba(14, 165, 233, 0.2);
    --glass-panel: rgba(255, 255, 255, 0.7);
    --glass-border: rgba(0, 0, 0, 0.08);
    --glass-hover: rgba(0, 0, 0, 0.05);
    --text-main: #0f172a;
    --text-muted: #64748b;
    --accent: #6366f1;
    --accent-glow: rgba(99, 102, 241, 0.4);
    --accent-sec: #0284c7;
    --msg-user: rgba(99, 102, 241, 0.1);
    --msg-bot: rgba(255, 255, 255, 0.9);
    --danger: #dc2626;
    --success: #059669;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
  
  /* BASE LAYOUT */
  body {
    background-color: var(--bg-base);
    color: var(--text-main);
    height: 100dvh; width: 100vw;
    overflow: hidden;
    position: relative;
    transition: background-color 0.4s ease;
  }

  /* DYNAMIC MESH BACKGROUND */
  .ambient-bg {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: -1;
    background: radial-gradient(circle at 15% 50%, var(--bg-mesh-1), transparent 40%),
                radial-gradient(circle at 85% 30%, var(--bg-mesh-2), transparent 40%);
    filter: blur(60px); opacity: 0.8; animation: pulseBg 10s infinite alternate;
  }
  @keyframes pulseBg { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* GLASSMORPHISM UTILITY */
  .glass {
    background: var(--glass-panel);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--glass-border);
  }

  /* TOAST NOTIFICATIONS */
  #toastContainer { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
  .toast {
    background: var(--glass-panel); backdrop-filter: blur(16px); border: 1px solid var(--glass-border);
    color: var(--text-main); padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 500;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2); animation: slideInRight 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    display: flex; align-items: center; gap: 10px;
  }
  .toast.error i { color: var(--danger); }
  .toast.success i { color: var(--success); }
  @keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes fadeOutUp { to { transform: translateY(-20px); opacity: 0; } }

  /* AUTH SCREEN */
  #authScreen { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
  .auth-box { padding: 40px; border-radius: 24px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
  .auth-box::before { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); animation: scanline 3s infinite linear; }
  @keyframes scanline { 100% { left: 200%; } }
  .auth-title { font-size: 32px; font-weight: 700; background: linear-gradient(to right, var(--accent), var(--accent-sec)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
  .input-field { width: 100%; padding: 16px; margin-bottom: 16px; border-radius: 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: var(--text-main); font-size: 15px; outline: none; transition: 0.3s; }
  .input-field:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); background: rgba(0,0,0,0.3); }
  .auth-btn { width: 100%; padding: 16px; border-radius: 14px; font-weight: 600; cursor: pointer; margin-bottom: 12px; font-size: 15px; transition: 0.2s; border: none; display: flex; justify-content: center; align-items: center; gap: 8px; }
  .btn-login { background: linear-gradient(135deg, var(--accent), var(--accent-sec)); color: #fff; box-shadow: 0 4px 15px var(--accent-glow); }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
  .btn-login:active { transform: scale(0.98); }
  .btn-signup { background: transparent; color: var(--text-main); border: 1px solid var(--glass-border); }
  .btn-signup:hover { background: var(--glass-hover); }

  /* APP SCREEN */
  #appScreen { display: none; width: 100%; height: 100%; flex-direction: row; }
  
  /* SIDEBAR */
  .sidebar { width: 300px; display: flex; flex-direction: column; z-index: 100; border-right: 1px solid var(--glass-border); flex-shrink: 0; transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
  .sidebar-header { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
  
  .new-chat-btn { padding: 14px; background: linear-gradient(135deg, var(--accent), var(--accent-sec)); color: #fff; border-radius: 14px; cursor: pointer; font-weight: 600; border: none; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 10px; box-shadow: 0 4px 15px var(--accent-glow); }
  .new-chat-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
  
  .search-box { width: 100%; padding: 12px 16px; border-radius: 12px; background: rgba(0,0,0,0.15); border: 1px solid var(--glass-border); color: var(--text-main); outline: none; font-size: 14px; transition: 0.3s; display: flex; align-items: center; }
  .search-box:focus { border-color: var(--accent); }
  
  .history-list { flex: 1; overflow-y: auto; padding: 0 12px 12px 12px; display: flex; flex-direction: column; gap: 4px; }
  .history-group-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin: 15px 0 5px 8px; font-weight: 600; }
  
  .history-item { padding: 12px 14px; border-radius: 12px; cursor: pointer; color: var(--text-main); font-size: 14px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; border: 1px solid transparent; group; }
  .history-item:hover { background: var(--glass-hover); }
  .history-item.active { background: var(--msg-user); border-color: var(--glass-border); font-weight: 500; }
  .history-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; display: flex; align-items: center; gap: 10px; }
  .history-actions { display: none; gap: 6px; font-size: 13px; }
  .history-item:hover .history-actions { display: flex; }
  .action-icon { cursor: pointer; color: var(--text-muted); transition: 0.2s; padding: 4px; border-radius: 6px; }
  .action-icon:hover { color: var(--text-main); background: rgba(255,255,255,0.1); }
  .action-icon.pin-active { color: var(--accent); }

  /* MAIN AREA */
  .main-area { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
  
  /* HEADER & MODEL SELECTOR */
  .header { height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--glass-border); z-index: 10; flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 15px; }
  .menu-btn { background: transparent; border: none; color: var(--text-main); font-size: 20px; cursor: pointer; display: none; padding: 8px; border-radius: 8px; }
  .header-tools { display: flex; align-items: center; gap: 10px; }
  
  .model-selector-wrapper { position: relative; }
  .model-select { appearance: none; background: var(--glass-panel); color: var(--text-main); border: 1px solid var(--glass-border); padding: 10px 35px 10px 15px; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; outline: none; backdrop-filter: blur(10px); transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  .model-select:hover, .model-select:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
  .model-selector-wrapper::after { content: '\f107'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-muted); }
  .model-select option { background: var(--bg-base); color: var(--text-main); }

  .icon-btn { background: var(--glass-panel); border: 1px solid var(--glass-border); color: var(--text-main); width: 40px; height: 40px; border-radius: 12px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; font-size: 15px; }
  .icon-btn:hover { background: var(--glass-hover); border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }

  /* DRAG & DROP OVERLAY */
  #dragOverlay { position: absolute; inset: 0; background: rgba(139, 92, 246, 0.2); backdrop-filter: blur(10px); z-index: 50; display: none; justify-content: center; align-items: center; flex-direction: column; color: var(--text-main); border: 2px dashed var(--accent); border-radius: 20px; margin: 20px; }
  #dragOverlay i { font-size: 60px; color: var(--accent); margin-bottom: 15px; animation: bounce 2s infinite; }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

  /* CHAT BOX */
  .chat-box { flex: 1; overflow-y: auto; padding: 30px 20px; display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth; align-items: center; }
  .msg-wrapper { display: flex; gap: 16px; width: 100%; max-width: 850px; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards; opacity: 0; transform: translateY(20px) scale(0.95); }
  @keyframes popIn { to { opacity: 1; transform: translateY(0) scale(1); } }
  
  .msg-wrapper.user { flex-direction: row-reverse; }
  
  .avatar { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; margin-top: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid var(--glass-border); }
  .avatar.user { background: var(--text-main); color: var(--bg-base); }
  .avatar.bot { background: linear-gradient(135deg, var(--accent), var(--accent-sec)); color: #fff; }
  
  .msg-content { display: flex; flex-direction: column; gap: 8px; max-width: 85%; }
  .msg-bubble { padding: 14px 18px; font-size: 15.5px; line-height: 1.6; border-radius: 16px; color: var(--text-main); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
  
  .msg-wrapper.user .msg-bubble { background: var(--msg-user); border-top-right-radius: 4px; border: 1px solid var(--glass-border); }
  .msg-wrapper.bot .msg-bubble { background: var(--msg-bot); border-top-left-radius: 4px; border: 1px solid var(--glass-border); }
  
  /* Markdown Styles */
  .msg-bubble p { margin-bottom: 10px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble strong { color: var(--accent); font-weight: 600; }
  .msg-bubble code:not(pre code) { background: rgba(139, 92, 246, 0.2); padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 13.5px; color: #e2e8f0; }
  [data-theme="light"] .msg-bubble code:not(pre code) { color: #0f172a; }
  
  /* Code Blocks */
  .code-block-wrapper { position: relative; margin: 15px 0; border-radius: 12px; overflow: hidden; border: 1px solid var(--glass-border); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
  .code-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; background: #1e1e2e; border-bottom: 1px solid rgba(255,255,255,0.1); font-family: 'Inter', sans-serif; font-size: 12px; color: #a6accd; }
  .btn-copy-code { background: transparent; border: none; color: #a6accd; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
  .btn-copy-code:hover { color: #fff; }
  pre { margin: 0; padding: 15px; background: #11111b; overflow-x: auto; font-family: 'JetBrains Mono', monospace; font-size: 14px; }
  
  /* Message Image Preview */
  .msg-image { max-width: 100%; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--glass-border); }

  /* Message Actions */
  .msg-actions { display: flex; gap: 15px; font-size: 13px; color: var(--text-muted); opacity: 0; transition: 0.3s; margin-top: 2px; }
  .msg-wrapper:hover .msg-actions { opacity: 1; }
  .msg-wrapper.user .msg-actions { justify-content: flex-end; }
  .action-text-btn { cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
  .action-text-btn:hover { color: var(--accent); }

  /* AI Typing Animation */
  .typing-indicator { display: flex; gap: 5px; padding: 5px 0; align-items: center; height: 24px; }
  .typing-indicator .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: typingBounce 1.4s infinite ease-in-out both; }
  .typing-indicator .dot:nth-child(1) { animation-delay: -0.32s; }
  .typing-indicator .dot:nth-child(2) { animation-delay: -0.16s; }
  @keyframes typingBounce { 0%, 80%, 100% { transform: scale(0); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; box-shadow: 0 0 10px var(--accent); } }

  /* INPUT AREA */
  .input-area { padding: 20px; z-index: 10; display: flex; flex-direction: column; align-items: center; background: transparent; flex-shrink: 0; width: 100%; }
  
  /* Image Preview Strip */
  #imgPreviewStrip { width: 100%; max-width: 850px; display: none; gap: 10px; padding-bottom: 10px; }
  .preview-thumb-container { position: relative; width: 60px; height: 60px; border-radius: 10px; border: 1px solid var(--glass-border); overflow: hidden; }
  .preview-thumb { width: 100%; height: 100%; object-fit: cover; }
  .remove-thumb { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; cursor: pointer; display: flex; justify-content: center; align-items: center; }

  .input-container { width: 100%; max-width: 850px; display: flex; gap: 10px; background: var(--glass-panel); border: 1px solid var(--glass-border); border-radius: 20px; padding: 10px 10px 10px 20px; align-items: flex-end; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.1); backdrop-filter: blur(20px); }
  .input-container:focus-within { border-color: var(--accent); box-shadow: 0 10px 40px var(--accent-glow); transform: translateY(-2px); }
  
  textarea#userInput { flex: 1; background: transparent; border: none; color: var(--text-main); outline: none; font-size: 15.5px; padding: 12px 0; resize: none; max-height: 150px; min-height: 24px; line-height: 1.5; overflow-y: auto; }
  textarea#userInput::placeholder { color: var(--text-muted); }
  
  .input-tools { display: flex; align-items: center; gap: 5px; padding-bottom: 6px; }
  .tool-btn { background: transparent; color: var(--text-muted); border: none; font-size: 18px; cursor: pointer; transition: 0.2s; padding: 8px; border-radius: 10px; }
  .tool-btn:hover { background: var(--glass-hover); color: var(--accent); }
  .tool-btn.recording { color: var(--danger); animation: pulse-rec 1.5s infinite; }
  @keyframes pulse-rec { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { transform: scale(1); } }
  
  .send-btn { background: linear-gradient(135deg, var(--accent), var(--accent-sec)); color: #fff; border: none; width: 42px; height: 42px; border-radius: 14px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; box-shadow: 0 4px 15px var(--accent-glow); flex-shrink: 0; }
  .send-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px var(--accent-glow); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  /* MOBILE RESPONSIVENESS */
  @media (max-width: 768px) {
    .sidebar { position: absolute; height: 100dvh; transform: translateX(-100%); background: var(--glass-panel); backdrop-filter: blur(30px); }
    .sidebar.open { transform: translateX(0); box-shadow: 10px 0 50px rgba(0,0,0,0.5); }
    .menu-btn { display: block; }
    .msg-wrapper { max-width: 100%; gap: 10px; }
    .msg-content { max-width: 88%; }
    .header-tools .model-select { display: none; }
    .model-select { padding: 8px 30px 8px 10px; font-size: 13px; max-width: 130px; }
    .input-area { padding: 10px; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
    .input-container { border-radius: 16px; padding: 8px 8px 8px 15px; }
    .msg-actions { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="ambient-bg"></div>
<div id="toastContainer"></div>

<div id="authScreen" class="glass">
  <div class="auth-box glass">
    <div class="auth-title">Clearyaan AI</div>
    <p style="font-size:14px; margin-bottom:30px; color:var(--text-muted)">Premium Futurist Edition</p>
    <input type="email" id="email" class="input-field" placeholder="Email Address">
    <input type="password" id="password" class="input-field" placeholder="Password (min 6 chars)">
    <button type="button" class="auth-btn btn-login" id="loginBtn" onclick="handleLogin()">
      <i class="fas fa-sign-in-alt"></i> Access Portal
    </button>
    <button type="button" class="auth-btn btn-signup" id="signupBtn" onclick="handleSignup()">
      <i class="fas fa-user-astronaut"></i> Create Identity
    </button>
  </div>
</div>

<div id="appScreen">
  <div class="sidebar glass" id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" onclick="startNewChat()">
        <i class="fas fa-sparkles"></i> New Intelligence
      </button>
      <div style="position: relative;">
        <i class="fas fa-search" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 13px;"></i>
        <input type="text" id="searchChat" class="search-box" style="padding-left: 35px;" placeholder="Search memories..." onkeyup="filterChats()">
      </div>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

  <div class="main-area" id="mainArea">
    <div id="dragOverlay"><i class="fas fa-cloud-upload-alt"></i><h2>Drop image to analyze</h2></div>

    <div class="header glass">
      <div class="header-left">
        <button class="menu-btn" onclick="toggleSidebar(event)"><i class="fas fa-bars"></i></button>
        <span style="font-weight: 700; font-size: 18px; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px;">
          <i class="fas fa-brain" style="color: var(--accent);"></i> Clearyaan
        </span>
      </div>
      <div class="header-tools">
        <div class="model-selector-wrapper">
          <select class="model-select" id="aiModel" onchange="saveModel()">
            <option value="gemini-2.0-flash">✨ Gemini 2.0 Flash</option>
            <option value="gemini-1.5-pro">🧠 Gemini 1.5 Pro</option>
            <option value="gemini-1.5-flash">⚡ Gemini 1.5 Flash</option>
            <option value="gemini-pro">💎 Gemini Pro</option>
          </select>
        </div>
        <button class="icon-btn" onclick="toggleTheme()" title="Toggle Theme"><i class="fas fa-moon" id="themeIcon"></i></button>
        <button class="icon-btn" onclick="exportData()" title="Export PDF/TXT"><i class="fas fa-download"></i></button>
        <button class="icon-btn" onclick="handleLogout()" title="Disconnect" style="color: var(--danger); border-color: rgba(239, 68, 68, 0.2);"><i class="fas fa-power-off"></i></button>
      </div>
    </div>

    <div class="chat-box" id="chat"></div>

    <div class="input-area">
      <div id="imgPreviewStrip">
        <div class="preview-thumb-container">
          <img id="previewImg" class="preview-thumb" src="">
          <button class="remove-thumb" onclick="removeImage()"><i class="fas fa-times"></i></button>
        </div>
      </div>
      
      <div class="input-container glass">
        <div class="input-tools">
          <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImageSelect(event)">
          <button class="tool-btn" onclick="document.getElementById('fileInput').click()" title="Upload Image"><i class="fas fa-image"></i></button>
          <button class="tool-btn" id="micBtn" onclick="toggleVoiceInput()" title="Voice Dictation"><i class="fas fa-microphone"></i></button>
        </div>
        
        <textarea id="userInput" placeholder="Message Clearyaan..." rows="1" oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
        
        <button class="send-btn" id="sendBtn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
      </div>
      <div style="font-size: 11px; color: var(--text-muted); margin-top: 8px; font-weight: 500;">Clearyaan AI can make mistakes. Verify important information.</div>
    </div>
  </div>
</div>

<script>
  // ==========================================
  // CONFIGURATION & SETUP
  // ==========================================
  const firebaseConfig = {
    apiKey: "AIzaSyDu1m0jBoWxhCeKUt_rNZMLcMBvBlF5emI",
    authDomain: "clearyaan-7719f.firebaseapp.com",
    projectId: "clearyaan-7719f",
    storageBucket: "clearyaan-7719f.firebasestorage.app",
    messagingSenderId: "43005421509",
    appId: "1:43005421509:web:9b1a89b48cef06b8988dac"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;
  let chats = {};
  let currentChatId = null;
  let isRecording = false;
  let pendingImageBase64 = null;
  let isGenerating = false;

  // Initialize Markdown Options
  marked.setOptions({
    breaks: true,
    highlight: function (code, lang) {
      const language = hljs.getLanguage(lang) ? lang : 'plaintext';
      return hljs.highlight(code, { language }).value;
    }
  });

  // Restore Theme & Model
  const savedTheme = localStorage.getItem('clearyaan_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  document.getElementById('themeIcon').className = savedTheme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';

  const savedModel = localStorage.getItem('clearyaan_model') || 'gemini-2.0-flash';
  document.getElementById('aiModel').value = savedModel;

  function toggleTheme() {
    const html = document.documentElement;
    const icon = document.getElementById('themeIcon');
    const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', newTheme);
    icon.className = newTheme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
    localStorage.setItem('clearyaan_theme', newTheme);
  }

  function saveModel() {
    localStorage.setItem('clearyaan_model', document.getElementById('aiModel').value);
    showToast("AI Engine updated", "success");
  }

  // ==========================================
  // TOAST NOTIFICATIONS
  // ==========================================
  function showToast(msg, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle';
    toast.innerHTML = `<i class="fas ${icon}"></i> <span>${msg}</span>`;
    container.appendChild(toast);
    setTimeout(() => { toast.style.animation = 'fadeOutUp 0.3s forwards'; setTimeout(() => toast.remove(), 300); }, 3000);
  }

  // ==========================================
  // AUTHENTICATION
  // ==========================================
  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.style.opacity = loading ? '0.7' : '1';
    btn.innerHTML = loading ? '<i class="fas fa-spinner fa-spin"></i> Processing...' : (btnId==='loginBtn'?'<i class="fas fa-sign-in-alt"></i> Access Portal':'<i class="fas fa-user-astronaut"></i> Create Identity');
  }

  window.handleLogin = async function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) return showToast('Credentials required.', 'error');
    setLoading('loginBtn', true);
    try {
      await auth.signInWithEmailAndPassword(email, password);
      showToast('Authentication successful.');
    } catch (err) {
      showToast(err.message, 'error');
    }
    setLoading('loginBtn', false);
  };

  window.handleSignup = async function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || password.length < 6) return showToast('Valid email & 6+ char password required.', 'error');
    setLoading('signupBtn', true);
    try {
      await auth.createUserWithEmailAndPassword(email, password);
      showToast('Identity established.');
    } catch (err) {
      showToast(err.message, 'error');
    }
    setLoading('signupBtn', false);
  };

  window.handleLogout = () => { auth.signOut(); showToast("Disconnected."); };

  auth.onAuthStateChanged(async (user) => {
    if (user) {
      currentUser = user;
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('appScreen').style.display = 'flex';
      await loadChatsFromCloud();
    } else {
      currentUser = null;
      document.getElementById('authScreen').style.display = 'flex';
      document.getElementById('appScreen').style.display = 'none';
    }
  });

  // ==========================================
  // DATA MANAGEMENT & SIDEBAR
  // ==========================================
  async function loadChatsFromCloud() {
    try {
      const snap = await db.collection("users").doc(currentUser.uid).get();
      if (snap.exists && snap.data().chats) {
        chats = snap.data().chats;
        const keys = Object.keys(chats);
        if (keys.length > 0) {
          currentChatId = keys[keys.length - 1];
          loadChatToScreen(currentChatId);
        } else { startNewChat(); }
      } else { chats = {}; startNewChat(); }
    } catch(e) { showToast("Sync Error", "error"); }
  }

  async function syncToCloud() {
    if (!currentUser) return;
    try {
      const syncData = JSON.parse(JSON.stringify(chats));
      Object.values(syncData).forEach(c => {
        c.messages.forEach(m => {
          if(m.parts) m.parts.forEach(p => { if(p.inlineData) delete p.inlineData; });
        });
      });
      await db.collection("users").doc(currentUser.uid).set({ chats: syncData }, { merge: true });
      updateSidebar();
    } catch(e) { console.error(e); }
  }
    window.startNewChat = () => {
    if(isGenerating) return showToast("Wait for AI to finish", "error");
    currentChatId = 'chat_' + Date.now();
    chats[currentChatId] = { title: "New Intelligence", messages: [], pinned: false, updated: Date.now() };
    document.getElementById('chat').innerHTML = '';
    removeImage();
    syncToCloud();
    closeSidebarIfMobile();
  };

  function loadChatToScreen(chatId) {
    if(isGenerating) return showToast("Wait for AI to finish", "error");
    currentChatId = chatId;
    const chatBox = document.getElementById('chat');
    chatBox.innerHTML = '';
    removeImage();
    const messages = chats[chatId]?.messages || [];
    messages.forEach(m => renderMessage(m.role, m.content, false, m.imgSrc));
    updateSidebar();
    closeSidebarIfMobile();
    setTimeout(() => chatBox.scrollTop = chatBox.scrollHeight, 100);
  }

  function updateSidebar() {
    const list = document.getElementById('historyList');
    list.innerHTML = '';
    
    // Sort logic: Pinned first, then by updated time
    const chatEntries = Object.entries(chats).sort((a, b) => {
      if(a[1].pinned && !b[1].pinned) return -1;
      if(!a[1].pinned && b[1].pinned) return 1;
      return (b[1].updated || 0) - (a[1].updated || 0);
    });

    let hasPinned = false;
    let hasRecent = false;

    chatEntries.forEach(([id, chat]) => {
      if (chat.pinned && !hasPinned) { list.innerHTML += `<div class="history-group-title">Pinned</div>`; hasPinned = true; }
      if (!chat.pinned && !hasRecent && hasPinned) { list.innerHTML += `<div class="history-group-title">Recent</div>`; hasRecent = true; }

      const item = document.createElement('div');
      item.className = 'history-item' + (id === currentChatId ? ' active' : '');
      item.innerHTML = `
        <div class="history-title" onclick="loadChatToScreen('${id}')">
          <i class="fas ${chat.pinned ? 'fa-thumbtack' : 'fa-comment-alt'}" style="color: ${chat.pinned ? 'var(--accent)' : 'inherit'}"></i> 
          ${chat.title}
        </div>
        <div class="history-actions">
          <span class="action-icon ${chat.pinned ? 'pin-active' : ''}" onclick="togglePin(event, '${id}')" title="Pin"><i class="fas fa-thumbtack"></i></span>
          <span class="action-icon" onclick="renameChat(event, '${id}')" title="Rename"><i class="fas fa-pen"></i></span>
          <span class="action-icon" style="color:var(--danger)" onclick="deleteChat(event, '${id}')" title="Delete"><i class="fas fa-trash"></i></span>
        </div>`;
      list.appendChild(item);
    });
  }

  window.togglePin = (e, id) => {
    e.stopPropagation();
    chats[id].pinned = !chats[id].pinned;
    chats[id].updated = Date.now();
    syncToCloud();
  };

  window.renameChat = (e, id) => {
    e.stopPropagation();
    const newName = prompt("Enter new memory name:", chats[id].title);
    if(newName && newName.trim()){
      chats[id].title = newName.trim();
      chats[id].updated = Date.now();
      syncToCloud();
      showToast("Memory renamed.");
    }
  };

  window.deleteChat = (e, id) => {
    e.stopPropagation();
    if(!confirm("Erase this memory permanently?")) return;
    delete chats[id];
    if (currentChatId === id) {
      const keys = Object.keys(chats);
      if(keys.length > 0) loadChatToScreen(keys[keys.length - 1]);
      else startNewChat();
    } else { syncToCloud(); }
    showToast("Memory erased.", "error");
  };

  window.filterChats = () => {
    const q = document.getElementById('searchChat').value.toLowerCase();
    document.querySelectorAll('.history-item').forEach(item => {
      const title = item.querySelector('.history-title').innerText.toLowerCase();
      // Search inside messages too (Deep Search)
      const id = item.querySelector('.action-icon').getAttribute('onclick').match(/'([^']+)'/)[1];
      const msgs = chats[id]?.messages.map(m=>m.content.toLowerCase()).join(' ') || '';
      
      item.style.display = (title.includes(q) || msgs.includes(q)) ? '' : 'none';
    });
    document.querySelectorAll('.history-group-title').forEach(t => t.style.display = q ? 'none' : '');
  };

  // ==========================================
  // MOBILE UI & UX LOGIC
  // ==========================================
  window.toggleSidebar = (e) => { if(e) e.stopPropagation(); document.getElementById('sidebar').classList.toggle('open'); }
  window.closeSidebarIfMobile = () => { if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open'); }
  document.getElementById('mainArea').addEventListener('click', closeSidebarIfMobile);

  function autoResize(textarea) {
    textarea.style.height = 'auto';
    textarea.style.height = (textarea.scrollHeight < 150 ? textarea.scrollHeight : 150) + 'px';
  }

  function handleEnter(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMsg();
    }
  }

  // ==========================================
  // CHAT RENDERING & STREAMING
  // ==========================================
  function parseAndFormatMarkdown(text) {
    const rawHtml = marked.parse(text);
    const div = document.createElement('div');
    div.innerHTML = rawHtml;
    // Add custom copy buttons to code blocks
    div.querySelectorAll('pre').forEach(pre => {
      const wrapper = document.createElement('div');
      wrapper.className = 'code-block-wrapper';
      const header = document.createElement('div');
      header.className = 'code-header';
      const lang = pre.querySelector('code')?.className.replace('language-', '') || 'code';
      header.innerHTML = `<span>${lang}</span><button class="btn-copy-code" onclick="copyCode(this)"><i class="fas fa-copy"></i> Copy</button>`;
      
      pre.parentNode.insertBefore(wrapper, pre);
      wrapper.appendChild(header);
      wrapper.appendChild(pre);
    });
    return div.innerHTML;
  }

  window.copyCode = (btn) => {
    const pre = btn.parentElement.nextElementSibling;
    navigator.clipboard.writeText(pre.innerText);
    btn.innerHTML = '<i class="fas fa-check"></i> Copied';
    btn.style.color = 'var(--success)';
    setTimeout(() => {
      btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
      btn.style.color = '#a6accd';
    }, 2000);
  };

  function createMessageNode(role, imgSrc = null) {
    const chatBox = document.getElementById('chat');
    const wrapper = document.createElement('div');
    wrapper.className = `msg-wrapper ${role}`;
    
    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.innerHTML = role === 'bot' ? '<i class="fas fa-sparkles"></i>' : '<i class="fas fa-user-astronaut"></i>';
    
    const contentDiv = document.createElement('div');
    contentDiv.className = 'msg-content';
    
    if (imgSrc) {
      const img = document.createElement('img');
      img.src = imgSrc;
      img.className = 'msg-image';
      contentDiv.appendChild(img);
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    contentDiv.appendChild(bubble);
    
    wrapper.appendChild(avatar);
    wrapper.appendChild(contentDiv);
    chatBox.appendChild(wrapper);
    chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    
    return { wrapper, bubble, contentDiv };
  }

  function addMessageActions(contentDiv, text, role) {
    if (contentDiv.querySelector('.msg-actions')) return;
    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    
    let html = `<span class="action-text-btn" onclick="copyText(\`${text.replace(/`/g, '\\`')}\`)"><i class="fas fa-copy"></i> Copy</span>`;
    html += `<span class="action-text-btn" onclick="speakText(\`${text.replace(/`/g, '\\`')}\`)"><i class="fas fa-volume-up"></i> Speak</span>`;
    
    if(role === 'bot') {
      html += `<span class="action-text-btn" onclick="regenerateLast()"><i class="fas fa-sync-alt"></i> Retry</span>`;
    }
    
    actions.innerHTML = html;
    contentDiv.appendChild(actions);
  }

  window.copyText = (text) => { navigator.clipboard.writeText(text); showToast("Text copied."); };

  function renderMessage(role, text, isStream = false, imgSrc = null) {
    const { bubble, contentDiv } = createMessageNode(role, imgSrc);
    
    if (isStream) {
      bubble.innerHTML = '<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    } else {
      bubble.innerHTML = parseAndFormatMarkdown(text);
      addMessageActions(contentDiv, text, role);
    }
    return { bubble, contentDiv };
  }

  // Simulated Streaming Effect for Premium Feel
  async function streamResponse(bubble, contentDiv, fullText) {
    bubble.innerHTML = '';
    const words = fullText.split(/(?<=\s|-)/); // Split by words keeping spaces
    let currentText = '';
    
    // Quick burst streaming
    for (let i = 0; i < words.length; i++) {
      currentText += words[i];
      // Every 5 words or at end, render markdown to prevent layout trashing
      if(i % 5 === 0 || i === words.length - 1) {
        bubble.innerHTML = parseAndFormatMarkdown(currentText);
        const chatBox = document.getElementById('chat');
        chatBox.scrollTop = chatBox.scrollHeight;
        await new Promise(r => setTimeout(r, 15)); // 15ms delay chunk
      }
    }
    addMessageActions(contentDiv, fullText, 'bot');
  }

  // ==========================================
  // IMAGE UPLOAD & DRAG/DROP
  // ==========================================
  function handleImageSelect(e) {
    const file = e.target.files[0];
    if(file) readImageFile(file);
    e.target.value = ''; // reset
  }

  function readImageFile(file) {
    const reader = new FileReader();
    reader.onload = (event) => {
      pendingImageBase64 = event.target.result;
      document.getElementById('previewImg').src = pendingImageBase64;
      document.getElementById('imgPreviewStrip').style.display = 'flex';
      document.getElementById('userInput').focus();
    };
    reader.readAsDataURL(file);
  }

  window.removeImage = () => {
    pendingImageBase64 = null;
    document.getElementById('previewImg').src = '';
    document.getElementById('imgPreviewStrip').style.display = 'none';
  };

  // Drag and Drop Logic
  const mainArea = document.getElementById('mainArea');
  const dragOverlay = document.getElementById('dragOverlay');

  mainArea.addEventListener('dragover', (e) => { e.preventDefault(); dragOverlay.style.display = 'flex'; });
  mainArea.addEventListener('dragleave', (e) => { e.preventDefault(); if(e.target === dragOverlay) dragOverlay.style.display = 'none'; });
  mainArea.addEventListener('drop', (e) => {
    e.preventDefault();
    dragOverlay.style.display = 'none';
    if(e.dataTransfer.files && e.dataTransfer.files[0]) readImageFile(e.dataTransfer.files[0]);
  });

  // ==========================================
  // VOICE INPUT
  // ==========================================
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition;
  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.onstart = () => { isRecording = true; document.getElementById('micBtn').classList.add('recording'); showToast("Listening...", "success"); };
    recognition.onresult = (e) => { 
      const input = document.getElementById('userInput');
      input.value += (input.value ? ' ' : '') + e.results[0][0].transcript;
      autoResize(input);
    };
    recognition.onend = () => { isRecording = false; document.getElementById('micBtn').classList.remove('recording'); };
    recognition.onerror = () => { isRecording = false; document.getElementById('micBtn').classList.remove('recording'); showToast("Voice recognition failed", "error"); };
  }

  function toggleVoiceInput() {
    if (!SpeechRecognition) return showToast("Voice input not supported in this browser.", "error");
    if (isRecording) recognition.stop(); else recognition.start();
  }

  function speakText(text) {
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
  }

  // ==========================================
  // EXPORT FUNCTIONS
  // ==========================================
  window.exportData = () => {
    if (!chats[currentChatId] || chats[currentChatId].messages.length === 0) return showToast("Nothing to export.", "error");
    
    const choice = confirm("Press OK for PDF, Cancel for TXT");
    const msgs = chats[currentChatId].messages;
    const title = chats[currentChatId].title;
    
    if (choice) {
      // PDF Export
      const element = document.createElement('div');
      element.style.padding = '20px';
      element.style.fontFamily = 'sans-serif';
      element.innerHTML = `<h2>${title}</h2>` + msgs.map(m => `<b>${m.role.toUpperCase()}:</b><br>${marked.parse(m.content)}<br><hr>`).join('');
      html2pdf().set({ margin: 10, filename: `${title}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(element).save();
      showToast("Downloading PDF...");
    } else {
      // TXT Export
      const text = msgs.map(m => `${m.role.toUpperCase()}:\n${m.content}\n`).join('\n-----------------------\n\n');
      const blob = new Blob([text], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${title}.txt`;
      a.click();
      showToast("Downloading TXT...");
    }
  };

  // ==========================================
  // CORE API COMMUNICATION
  // ==========================================
  window.regenerateLast = () => {
    if(!chats[currentChatId] || chats[currentChatId].messages.length < 2) return;
    // Remove last bot message
    if(chats[currentChatId].messages[chats[currentChatId].messages.length-1].role === 'bot') {
      chats[currentChatId].messages.pop();
    }
    // Delete from UI (quick re-render)
    loadChatToScreen(currentChatId);
    // Trigger Send
    executeSendRequest(null);
  }

  async function sendMsg() {
    if (isGenerating) return;
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    const hasImage = !!pendingImageBase64;
    
    if (!text && !hasImage) return;

    input.value = '';
    input.style.height = 'auto'; // reset
    if (!chats[currentChatId]) startNewChat();

    // Prepare User Message Object
    const userMsg = { role: 'user', content: text, parts: [] };
    if(text) userMsg.parts.push({ text: text });
    
    const imgSrcToRender = pendingImageBase64; // Store for UI
    
    if (pendingImageBase64) {
      const base64Data = pendingImageBase64.split(',')[1];
      const mimeType = pendingImageBase64.match(/data:(.*?);base64/)[1];
      userMsg.parts.push({ inlineData: { data: base64Data, mimeType } });
      userMsg.imgSrc = pendingImageBase64; // Temporarily save for UI render
      removeImage(); // Clear UI
    }

    chats[currentChatId].messages.push(userMsg);
    chats[currentChatId].updated = Date.now();
    
    // Auto title generation
    if (chats[currentChatId].messages.length === 1 && text) {
      chats[currentChatId].title = text.substring(0, 30) + (text.length > 30 ? '...' : '');
    }

    renderMessage('user', text, false, imgSrcToRender);
    await executeSendRequest();
  }

  async function executeSendRequest() {
    isGenerating = true;
    document.getElementById('sendBtn').disabled = true;
    const { bubble, contentDiv } = renderMessage('bot', '', true); // Show typing

    // Prepare exactly what Vercel needs (and strip Base64 from previous history to avoid giant payloads)
    const geminiMessages = chats[currentChatId].messages.map(m => {
      let finalParts = m.parts || [{ text: m.content }];
      return {
        role: m.role === 'user' ? 'user' : 'model',
        parts: finalParts
      };
    });

    const selectedModel = document.getElementById('aiModel').value;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          messages: geminiMessages,
          model: selectedModel
        })
      });

      if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
      const data = await res.json();
      const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || "Response assimilation failed.";

      // Stream the response
      await streamResponse(bubble, contentDiv, reply);

      chats[currentChatId].messages.push({ role: 'bot', content: reply });
      chats[currentChatId].updated = Date.now();
      syncToCloud(); 

    } catch(err) {
      bubble.innerHTML = `<span style="color:var(--danger)"><i class="fas fa-exclamation-triangle"></i> Quantum connection lost. Please verify your Vercel backend and API key.</span>`;
      console.error(err);
      chats[currentChatId].messages.pop(); // Remove user msg if failed completely
    } finally {
      isGenerating = false;
      document.getElementById('sendBtn').disabled = false;
      if(window.innerWidth > 768) document.getElementById('userInput').focus();
    }
  }
</script>
</body>
</html>
