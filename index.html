<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clearyaan AI - Ultimate Pro</title>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root[data-theme="dark"] {
    --bg-base: #0f172a; --bg-panel: rgba(30, 41, 59, 0.7); --bg-msg-user: rgba(14, 165, 233, 0.2);
    --bg-msg-bot: rgba(51, 65, 85, 0.6); --accent: #0ea5e9; --accent-glow: rgba(14, 165, 233, 0.5);
    --text-main: #f8fafc; --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.1);
  }
  :root[data-theme="light"] {
    --bg-base: #f0f9ff; --bg-panel: rgba(255, 255, 255, 0.8); --bg-msg-user: rgba(14, 165, 233, 0.15);
    --bg-msg-bot: rgba(255, 255, 255, 0.9); --accent: #0284c7; --accent-glow: rgba(2, 132, 199, 0.4);
    --text-main: #0f172a; --text-muted: #475569; --border: rgba(0, 0, 0, 0.1);
  }
  * { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; margin: 0; padding: 0; transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease; }
  body {
    background: var(--bg-base); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; position: relative;
    background-image: radial-gradient(circle at 15% 50%, rgba(14, 165, 233, 0.15), transparent 25%), radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
  }
  .particles { position: absolute; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
  .particle { position: absolute; border-radius: 50%; background: var(--accent); opacity: 0.3; animation: float 15s infinite linear; filter: blur(4px); }
  @keyframes float { 0% { transform: translateY(100vh) scale(0.5); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: translateY(-100px) scale(1.5); opacity: 0; } }
  .glass { background: var(--bg-panel); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); }

  /* AUTH SCREEN */
  #authScreen { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 2000; background: var(--bg-base); }
  .auth-box { padding: 40px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
  .input-field { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; background: rgba(0,0,0,0.05); border: 1px solid var(--border); color: var(--text-main); outline: none; font-size: 15px; backdrop-filter: blur(5px); }
  .input-field:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
  
  /* FIXED AUTH BUTTONS */
  .auth-btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 12px;
    font-size: 15px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn-login {
    background: var(--accent);
    color: #fff;
    border: none;
    box-shadow: 0 4px 15px var(--accent-glow);
  }
  .btn-login:active { transform: scale(0.97); opacity: 0.9; }
  .btn-signup {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-signup:active { transform: scale(0.97); background: rgba(255,255,255,0.05); }

  /* APP SCREEN */
  #appScreen { display: none; width: 100%; height: 100%; flex-direction: row; }
  .sidebar { width: 280px; display: flex; flex-direction: column; z-index: 100; border-right: 1px solid var(--border); }
  .sidebar-header { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
  .new-chat-btn { padding: 12px; background: var(--accent); color: #fff; border-radius: 12px; cursor: pointer; font-weight: bold; border: none; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 15px var(--accent-glow); }
  .search-box { width: 100%; padding: 10px 15px; border-radius: 8px; background: rgba(0,0,0,0.1); border: 1px solid var(--border); color: var(--text-main); outline: none; font-size: 13px; }
  .history-list { flex: 1; overflow-y: auto; padding: 0 10px 10px 10px; }
  .history-item { padding: 12px; border-radius: 10px; cursor: pointer; color: var(--text-muted); font-size: 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border: 1px solid transparent; transition: all 0.2s ease; }
  .history-item.active { background: var(--bg-msg-user); color: var(--text-main); border-color: var(--accent); }
  .history-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; display: flex; align-items: center; gap: 8px; }
  .history-actions { display: none; gap: 8px; font-size: 12px; }
  .history-item:hover .history-actions { display: flex; }
  .action-icon { cursor: pointer; color: var(--text-muted); transition: color 0.2s; }
  .action-icon:hover { color: var(--accent); }
  .main-area { flex: 1; display: flex; flex-direction: column; position: relative; }
  .header { height: 65px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); z-index: 10; }
  .header-left { display: flex; align-items: center; gap: 15px; }
  .menu-btn { background: transparent; border: none; color: var(--text-main); font-size: 20px; cursor: pointer; display: none; }
  .header-tools { display: flex; align-items: center; gap: 12px; }
  .icon-btn { background: transparent; border: 1px solid var(--border); color: var(--text-main); width: 36px; height: 36px; border-radius: 10px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
  .icon-btn:hover { background: var(--bg-msg-user); color: var(--accent); border-color: var(--accent); }
  .model-select { background: rgba(0,0,0,0.1); color: var(--text-main); border: 1px solid var(--border); padding: 8px 12px; border-radius: 10px; outline: none; font-weight: bold; font-size: 13px; cursor: pointer; backdrop-filter: blur(5px); }
  .chat-box { flex: 1; overflow-y: auto; padding: 30px 20px; display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth; }
  .msg-wrapper { display: flex; gap: 15px; max-width: 85%; animation: fadeIn 0.4s ease forwards; opacity: 0; transform: translateY(10px); }
  @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
  .msg-wrapper.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-wrapper.bot { align-self: flex-start; }
  .avatar { width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 1px solid var(--border); }
  .avatar.user { background: var(--accent); color: white; }
  .avatar.bot { background: linear-gradient(135deg, #8b5cf6, var(--accent)); color: white; }
  .msg-content { display: flex; flex-direction: column; gap: 5px; }
  .msg-bubble { padding: 14px 18px; border-radius: 16px; font-size: 15px; line-height: 1.6; word-wrap: break-word; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
  .msg-wrapper.user .msg-bubble { background: var(--bg-msg-user); border-top-right-radius: 4px; border: 1px solid var(--border); }
  .msg-wrapper.bot .msg-bubble { background: var(--bg-msg-bot); border-top-left-radius: 4px; border: 1px solid var(--border); }
  .msg-actions { display: flex; gap: 10px; font-size: 12px; color: var(--text-muted); padding: 0 5px; }
  .msg-wrapper.user .msg-actions { justify-content: flex-end; }
  .action-text-btn { cursor: pointer; transition: color 0.2s; }
  .action-text-btn:hover { color: var(--accent); }
  pre { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; overflow-x: auto; border: 1px solid var(--border); margin: 10px 0; }
  code { color: #34d399; font-family: 'Courier New', Courier, monospace; font-size: 14px; }
  .typing-indicator { display: flex; gap: 5px; padding: 5px 10px; }
  .dot { width: 8px; height: 8px; background: var(--text-muted); border-radius: 50%; animation: blink 1.4s infinite both; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1.2); background: var(--accent); } }
  .input-area { padding: 20px; border-top: 1px solid var(--border); z-index: 10; }
  .input-container { display: flex; gap: 10px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 20px; padding: 8px 8px 8px 20px; align-items: center; transition: all 0.3s ease; backdrop-filter: blur(10px); }
  .input-container:focus-within { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
  input#userInput { flex: 1; background: transparent; border: none; color: var(--text-main); outline: none; font-size: 15px; }
  input#userInput:focus { caret-color: var(--accent); }
  .tool-btn { background: transparent; color: var(--text-muted); border: none; font-size: 18px; cursor: pointer; transition: 0.2s; padding: 5px; }
  .tool-btn:hover, .tool-btn.recording { color: #ef4444; transform: scale(1.1); }
  .send-btn { background: var(--accent); color: #fff; border: none; width: 44px; height: 44px; border-radius: 16px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; box-shadow: 0 4px 10px var(--accent-glow); }

  /* Error message style */
  .auth-error { color: #ef4444; font-size: 13px; margin-bottom: 10px; display: none; }
  .auth-success { color: #22c55e; font-size: 13px; margin-bottom: 10px; display: none; }

  @media (max-width: 768px) {
    .sidebar { position: absolute; height: 100%; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); background: var(--bg-base); }
    .sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
    .menu-btn { display: block; }
    .msg-wrapper { max-width: 95%; }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<!-- AUTH SCREEN -->
<div id="authScreen" class="glass">
  <div class="auth-box glass">
    <h1 style="color:var(--accent); margin-bottom:5px; font-size: 28px;">Clearyaan AI</h1>
    <p style="font-size:13px; margin-bottom:25px; color:var(--text-muted)">Ultimate Pro Edition</p>
    <input type="email" id="email" class="input-field" placeholder="Email Address">
    <input type="password" id="password" class="input-field" placeholder="Password (min 6 characters)">
    <div class="auth-error" id="authError"></div>
    <div class="auth-success" id="authSuccess"></div>
    <button type="button" class="auth-btn btn-login" id="loginBtn" onclick="handleLogin()">
      <i class="fas fa-sign-in-alt"></i> Log In
    </button>
    <button type="button" class="auth-btn btn-signup" id="signupBtn" onclick="handleSignup()">
      <i class="fas fa-user-plus"></i> Create Account
    </button>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen">
  <div class="sidebar glass" id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" onclick="startNewChat()"><i class="fas fa-plus"></i> New Chat</button>
      <input type="text" id="searchChat" class="search-box" placeholder="Search chats..." onkeyup="filterChats()">
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

  <div class="main-area glass">
    <div class="header">
      <div class="header-left">
        <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h3 style="color: var(--accent); margin:0; font-size: 18px; display: flex; align-items: center; gap: 8px;">
          <i class="fas fa-bolt"></i> Clearyaan Pro
        </h3>
      </div>
      <div class="header-tools">
        <button class="icon-btn" onclick="toggleTheme()" title="Toggle Theme"><i class="fas fa-moon" id="themeIcon"></i></button>
        <button class="icon-btn" onclick="exportChat()" title="Export Chat"><i class="fas fa-download"></i></button>
        <button class="icon-btn" onclick="shareChat()" title="Share Chat"><i class="fas fa-share-alt"></i></button>
        <select class="model-select" id="aiModel">
          <option value="gemini">✨ Gemini Pro</option>
        </select>
        <button class="icon-btn" onclick="handleLogout()" style="color: #ef4444; border-color: #ef4444;" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>

    <div class="chat-box" id="chat"></div>

    <div class="input-area glass">
      <div class="input-container">
        <button class="tool-btn" id="micBtn" onclick="toggleVoiceInput()" title="Voice Typing"><i class="fas fa-microphone"></i></button>
        <input type="text" id="userInput" placeholder="Message Clearyaan..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button class="send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDu1m0jBoWxhCeKUt_rNZMLcMBvBlF5emI",
    authDomain: "clearyaan-7719f.firebaseapp.com",
    projectId: "clearyaan-7719f",
    storageBucket: "clearyaan-7719f.firebasestorage.app",
    messagingSenderId: "43005421509",
    appId: "1:43005421509:web:9b1a89b48cef06b8988dac"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;
  let chats = {};
  let currentChatId = null;
  let isRecording = false;

  function showError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('authSuccess').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('authSuccess');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('authError').style.display = 'none';
  }

  function hideMessages() {
    document.getElementById('authError').style.display = 'none';
    document.getElementById('authSuccess').style.display = 'none';
  }

  function setLoading(btn, loading) {
    btn.disabled = loading;
    btn.style.opacity = loading ? '0.7' : '1';
  }

  // AUTH FUNCTIONS — FIXED
  window.handleLogin = function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    if (!email || !password) return showError('Please enter email and password.');
    hideMessages();
    setLoading(btn, true);

    auth.signInWithEmailAndPassword(email, password)
      .catch(err => {
        setLoading(btn, false);
        if (err.code === 'auth/user-not-found') showError('No account found. Please create an account first.');
        else if (err.code === 'auth/wrong-password') showError('Wrong password. Please try again.');
        else if (err.code === 'auth/invalid-email') showError('Invalid email address.');
        else showError(err.message);
      });
  };

  window.handleSignup = function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('signupBtn');

    if (!email) return showError('Please enter your email address.');
    if (!password || password.length < 6) return showError('Password must be at least 6 characters.');
    hideMessages();
    setLoading(btn, true);

    auth.createUserWithEmailAndPassword(email, password)
      .then(() => {
        showSuccess('Account created! Logging you in...');
      })
      .catch(err => {
        setLoading(btn, false);
        if (err.code === 'auth/email-already-in-use') showError('Email already used. Please log in instead.');
        else if (err.code === 'auth/invalid-email') showError('Invalid email address.');
        else if (err.code === 'auth/weak-password') showError('Password is too weak. Use at least 6 characters.');
        else showError(err.message);
      });
  };

  window.handleLogout = () => auth.signOut();

  auth.onAuthStateChanged(async (user) => {
    if (user) {
      currentUser = user;
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('appScreen').style.display = 'flex';
      await loadChatsFromCloud();
    } else {
      currentUser = null;
      document.getElementById('authScreen').style.display = 'flex';
      document.getElementById('appScreen').style.display = 'none';
    }
  });

  // CHAT MANAGEMENT
  async function loadChatsFromCloud() {
    try {
      const snap = await db.collection("users").doc(currentUser.uid).get();
      if (snap.exists && snap.data().chats) {
        chats = snap.data().chats;
        const keys = Object.keys(chats);
        if (keys.length > 0) {
          currentChatId = keys[keys.length - 1];
          loadChatToScreen(currentChatId);
        } else { startNewChat(); }
      } else { chats = {}; startNewChat(); }
    } catch(e) { console.error("DB Error:", e); }
  }

  async function syncToCloud() {
    if (!currentUser) return;
    try {
      await db.collection("users").doc(currentUser.uid).set({ chats }, { merge: true });
      updateSidebar();
    } catch(e) { console.log(e); }
  }

  window.startNewChat = () => {
    currentChatId = 'chat_' + Date.now();
    chats[currentChatId] = { title: "New Chat", messages: [] };
    document.getElementById('chat').innerHTML = '';
    syncToCloud();
  };

  function loadChatToScreen(chatId) {
    currentChatId = chatId;
    const chatBox = document.getElementById('chat');
    chatBox.innerHTML = '';
    const messages = chats[chatId]?.messages || [];
    messages.forEach(m => renderMessage(m.role, m.content));
    updateSidebar();
  }

  function updateSidebar() {
    const list = document.getElementById('historyList');
    list.innerHTML = '';
    Object.entries(chats).reverse().forEach(([id, chat]) => {
      const item = document.createElement('div');
      item.className = 'history-item' + (id === currentChatId ? ' active' : '');
      item.innerHTML = `
        <div class="history-title"><i class="fas fa-comment"></i> ${chat.title}</div>
        <div class="history-actions">
          <span class="action-icon" onclick="deleteChat('${id}')"><i class="fas fa-trash"></i></span>
        </div>`;
      item.onclick = () => loadChatToScreen(id);
      list.appendChild(item);
    });
  }

  window.deleteChat = (id) => {
    delete chats[id];
    if (currentChatId === id) startNewChat();
    syncToCloud();
  };

  window.filterChats = () => {
    const q = document.getElementById('searchChat').value.toLowerCase();
    document.querySelectorAll('.history-item').forEach(item => {
      item.style.display = item.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  };

  // UI
  function toggleTheme() {
    const html = document.documentElement;
    const icon = document.getElementById('themeIcon');
    if (html.getAttribute('data-theme') === 'dark') {
      html.setAttribute('data-theme', 'light');
      icon.className = 'fas fa-sun';
    } else {
      html.setAttribute('data-theme', 'dark');
      icon.className = 'fas fa-moon';
    }
  }

  function initParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      let div = document.createElement('div');
      div.className = 'particle';
      div.style.left = Math.random() * 100 + 'vw';
      div.style.width = Math.random() * 60 + 20 + 'px';
      div.style.height = div.style.width;
      div.style.animationDuration = Math.random() * 10 + 10 + 's';
      div.style.animationDelay = Math.random() * 5 + 's';
      container.appendChild(div);
    }
  }
  initParticles();

  window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');

  function parseMarkdown(text) {
    let parsed = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
    parsed = parsed.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
    parsed = parsed.replace(/\n/g, '<br>');
    return parsed;
  }

  function renderMessage(role, text, isStream = false) {
    const chatBox = document.getElementById('chat');
    const wrapper = document.createElement('div');
    wrapper.className = `msg-wrapper ${role}`;
    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.innerHTML = role === 'bot' ? '<i class="fas fa-robot"></i>' : '<i class="fas fa-user"></i>';
    const contentDiv = document.createElement('div');
    contentDiv.className = 'msg-content';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    if (isStream) {
      bubble.innerHTML = '<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    } else {
      bubble.innerHTML = role === 'bot' ? parseMarkdown(text) : text;
    }
    contentDiv.appendChild(bubble);
    if (role === 'bot' && !isStream) {
      const actions = document.createElement('div');
      actions.className = 'msg-actions';
      actions.innerHTML = `
        <span class="action-text-btn" onclick="speakText(this.parentElement.previousElementSibling.innerText)"><i class="fas fa-volume-up"></i> Listen</span>
        <span class="action-text-btn" onclick="navigator.clipboard.writeText(this.parentElement.previousElementSibling.innerText)"><i class="fas fa-copy"></i> Copy</span>`;
      contentDiv.appendChild(actions);
    }
    wrapper.appendChild(avatar);
    wrapper.appendChild(contentDiv);
    chatBox.appendChild(wrapper);
    chatBox.scrollTop = chatBox.scrollHeight;
    return { wrapper, bubble, contentDiv };
  }

  // VOICE
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition;
  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.onstart = () => { isRecording = true; document.getElementById('micBtn').classList.add('recording'); };
    recognition.onresult = (e) => { document.getElementById('userInput').value += e.results[0][0].transcript + ' '; };
    recognition.onend = () => { isRecording = false; document.getElementById('micBtn').classList.remove('recording'); };
  }

  function toggleVoiceInput() {
    if (!SpeechRecognition) return alert("Voice typing not supported in this browser.");
    if (isRecording) recognition.stop(); else recognition.start();
  }

  function speakText(text) {
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
  }

  // EXPORT & SHARE
  function exportChat() {
    const msgs = chats[currentChatId]?.messages || [];
    const text = msgs.map(m => `${m.role.toUpperCase()}: ${m.content}`).join('\n\n');
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'clearyaan-chat.txt';
    a.click();
  }

  function shareChat() {
    if (navigator.share) {
      const msgs = chats[currentChatId]?.messages || [];
      const text = msgs.map(m => `${m.role.toUpperCase()}: ${m.content}`).join('\n\n');
      navigator.share({ title: 'Clearyaan AI Chat', text });
    } else {
      navigator.clipboard.writeText(window.location.href);
      alert('Link copied!');
    }
  }

  // SEND MESSAGE
  async function sendMsg() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    if (!chats[currentChatId]) startNewChat();

    chats[currentChatId].messages.push({ role: 'user', content: text });
    if (chats[currentChatId].messages.length === 1) {
      chats[currentChatId].title = text.substring(0, 30) + (text.length > 30 ? '...' : '');
    }

    renderMessage('user', text);
    const { bubble, contentDiv } = renderMessage('bot', '', true);

    // Build Gemini format
    const geminiMessages = chats[currentChatId].messages.map(m => ({
      role: m.role === 'user' ? 'user' : 'model',
      parts: [{ text: m.content }]
    }));

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: geminiMessages })
      });

      const data = await res.json();
      const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, I couldn't get a response.";

      bubble.innerHTML = parseMarkdown(reply);
      const actions = document.createElement('div');
      actions.className = 'msg-actions';
      actions.innerHTML = `
        <span class="action-text-btn" onclick="speakText(this.parentElement.previousElementSibling.innerText)"><i class="fas fa-volume-up"></i> Listen</span>
        <span class="action-text-btn" onclick="navigator.clipboard.writeText(this.parentElement.previousElementSibling.innerText)"><i class="fas fa-copy"></i> Copy</span>`;
      contentDiv.appendChild(actions);

      chats[currentChatId].messages.push({ role: 'bot', content: reply });
      syncToCloud();

    } catch(err) {
      bubble.innerHTML = '<span style="color:#ef4444">Error: Could not connect. Please try again.</span>';
    }

    document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
  }
</script>
</body>
</html>
